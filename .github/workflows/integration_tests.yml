name: Integration Tests

permissions: read-all

on:
  workflow_call:
    inputs:
      name:
        type: string
        description: "The name of the workflow used for the concurrency group."
        required: true
      # We pass the list of examples here, but we can't pass an array as argument
      # Instead, we pass a String with a valid JSON array.
      # The workaround is mentioned here https://github.com/orgs/community/discussions/11692
      examples:
        type: string
        description: "The list of examples to run. Pass a String with a valid JSON array such as \"[ 'Converse', 'ConverseStream' ]\""
        required: true
        default: ""
      examples_enabled:
        type: boolean
        description: "Boolean to enable the compilation of examples. Defaults to true."
        default: true
      matrix_linux_command:
        type: string
        description: "The command of the current Swift version linux matrix job to execute."
        required: true

## We are cancelling previously triggered workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.name }}
  cancel-in-progress: true

jobs:
  test-examples:
    name: Test Examples/${{ matrix.examples }} on
    if: ${{ inputs.examples_enabled }}
    runs-on: ubuntu-latest
    container: swift:6.3-amazonlinux2023
    strategy:
      fail-fast: false
      matrix:
        examples: ${{ fromJson(inputs.examples) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: Examples/${{ matrix.examples }}/.build
          key: spm-${{ runner.os }}-${{ matrix.examples }}-${{ hashFiles(format('Examples/{0}/Package.swift', matrix.examples)) }}
          restore-keys: |
            spm-${{ runner.os }}-${{ matrix.examples }}-

      - name: Mark the workspace as safe
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - name: Run matrix job
        env:
          COMMAND: ${{ inputs.matrix_linux_command }}
          EXAMPLE: ${{ matrix.examples }}
        run: |
          .github/workflows/scripts/integration_tests.sh

  playground-backend:
    runs-on: ubuntu-latest
    container: swift:6.3-amazonlinux2023
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: Examples/web-playground/backend/.build
          key: spm-${{ runner.os }}-playground-backend-${{ hashFiles('Examples/web-playground/backend/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-playground-backend-
      - name: Web playground backend build
        working-directory: Examples/web-playground/backend
        run: swift build
